{% extends "base.html" %}
{% block title %}Login - KMRL DMS{% endblock %}
{% block auth_content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-brand">
            <i class="bi bi-train-front-fill"></i>
            <h3>KMRL Document System</h3>
            <p>Automated Document Management for Kochi Metro Rail Limited</p>
        </div>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label class="form-label">Employee ID</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                    <input type="text" class="form-control" name="employee_id" placeholder="e.g. ADMIN001" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control" name="password" placeholder="Enter your password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-auth">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
        <p class="auth-hint">Default Admin &mdash; ID: <strong>ADMIN001</strong> / Password: <strong>admin123</strong></p>
    </div>
</div>
{% endblock %}
